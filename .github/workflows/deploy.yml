name: Deploy Docusaurus to Organization Page

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'docs/**' # Only trigger if changes happen in the docs directory

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install Dependencies
        working-directory: ./docs
        run: npm ci

      - name: Build Docusaurus
        working-directory: ./docs
        run: npm run build

      - name: Deploy to external repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          # You need to create a Personal Access Token (PAT) with repo scope,
          # and add it as a secret named 'EXTERNAL_REPO_PAT' in this repository.
          personal_token: ${{ secrets.EXTERNAL_REPO_PAT }}
          external_repository: Mirukali/Mirukali.github.io
          publish_branch: main
          publish_dir: ./docs/build
          cname: miruka.alikuxac.xyz
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "docs(deploy): update documentation [skip ci]"
